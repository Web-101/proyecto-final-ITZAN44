<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compra confirmada — CINEPLEX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos/comun.css">
  <link rel="stylesheet" href="estilos/confirmacion.css">
</head>
<body>
  <div class="vista">
    <main class="confirmacion">
      <div class="sello-exito">
        <img class="icono-exito" src="img-pelis/Iconos/tilde-hecho.png" alt="">
      </div>
      <h1 class="titulo-exito">¡Gracias por tu compra!</h1>
      <p class="subtitulo-exito">Tu entrada está lista. Te esperamos en el cine.</p>

      <section class="ticket">
        <h2 class="ticket-pelicula">Superman</h2>
        <p class="ticket-genero">Acción · 2h 10min</p>

        <div class="divisor"></div>

        <div class="ticket-datos">
          <div class="dato">
            <span class="dato-etiqueta">Fecha</span>
            <span class="dato-valor">Hoy</span>
          </div>
          <div class="dato">
            <span class="dato-etiqueta">Hora</span>
            <span class="dato-valor">19:00</span>
          </div>
          <div class="dato">
            <span class="dato-etiqueta">Sala</span>
            <span class="dato-valor">Sala 1</span>
          </div>
          <div class="dato">
            <span class="dato-etiqueta">Asientos</span>
            <span class="dato-valor">F5, F6</span>
          </div>
        </div>

        <div class="divisor"></div>

        <div class="ticket-total">
          <span class="dato-etiqueta">Total</span>
          <span class="ticket-precio">$10.00</span>
        </div>
      </section>

      <button class="boton-inicio" type="button">Volver al inicio</button>
      <button class="enlace-detalles" type="button">Ver detalles de la función</button>
    </main>
  </div>
</body>
</html>
