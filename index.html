<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CINEPLEX — En Cartelera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos/comun.css">
  <link rel="stylesheet" href="estilos/inicio.css">
</head>
<body>
  <header class="encabezado">
    <div class="marca">
      <img class="icono-logo" src="img-pelis/Iconos/Logo.png" alt="">
      <h1 class="logo">CINEPLEX</h1>
    </div>
    <button class="boton-busqueda" type="button" aria-label="Buscar películas">
      <img class="icono-lupa" src="img-pelis/Iconos/Lupa.png" alt="">
    </button>
  </header>

  <main class="contenido">
    <section class="seccion-cartelera">
      <div class="titulo-seccion">
        <h2>En Cartelera</h2>
        <span class="ver-todo">VER TODO ›</span>
      </div>

      <div class="grilla-peliculas">
        <article class="tarjeta-pelicula">
          <img class="poster" src="img-pelis/Superman.jpg" alt="Póster de Superman">
          <h3 class="titulo-pelicula">Superman</h3>
          <p class="info"><span class="duracion">130 min</span> <span class="genero">Acción</span></p>
        </article>

        <article class="tarjeta-pelicula">
          <img class="poster" src="img-pelis/Batman.jpg" alt="Póster de Batman">
          <h3 class="titulo-pelicula">Batman</h3>
          <p class="info"><span class="duracion">120 min</span> <span class="genero">Acción</span></p>
        </article>

        <article class="tarjeta-pelicula">
          <img class="poster" src="img-pelis/Shrekban.jpg" alt="Póster de Shrek">
          <h3 class="titulo-pelicula">Shrek</h3>
          <p class="info"><span class="duracion">90 min</span> <span class="genero">Animación</span></p>
        </article>

        <article class="tarjeta-pelicula">
          <img class="poster" src="img-pelis/Blade-runer.jpg" alt="Póster de Blade Runner">
          <h3 class="titulo-pelicula">Blade Runner</h3>
          <p class="info"><span class="duracion">117 min</span> <span class="genero">Ciencia Ficción</span></p>
        </article>

        <article class="tarjeta-pelicula">
          <img class="poster" src="img-pelis/Shaolin-Soccer.jpg" alt="Póster de Shaolin Soccer">
          <h3 class="titulo-pelicula">Shaolin Soccer</h3>
          <p class="info"><span class="duracion">113 min</span> <span class="genero">Comedia</span></p>
        </article>

        <article class="tarjeta-pelicula">
          <img class="poster" src="img-pelis/Rey-leon.jpg" alt="Póster de El Rey León">
          <h3 class="titulo-pelicula">El Rey León</h3>
          <p class="info"><span class="duracion">88 min</span> <span class="genero">Animación</span></p>
        </article>

        <article class="tarjeta-pelicula">
          <img class="poster" src="img-pelis/Gato-con-Botas.jpg" alt="Póster de El Gato con Botas">
          <h3 class="titulo-pelicula">El Gato con Botas</h3>
          <p class="info"><span class="duracion">90 min</span> <span class="genero">Animación</span></p>
        </article>

        <article class="tarjeta-pelicula">
          <img class="poster" src="img-pelis/Deadpool.jpg" alt="Póster de Deadpool">
          <h3 class="titulo-pelicula">Deadpool</h3>
          <p class="info"><span class="duracion">108 min</span> <span class="genero">Acción</span></p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
