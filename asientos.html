<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selección de asientos — CINEPLEX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="estilos/comun.css">
  <link rel="stylesheet" href="estilos/asientos.css">
</head>
<body>
  <div class="vista">
    <header class="encabezado-asientos">
      <button class="boton-volver" type="button" aria-label="Volver">
        <img class="icono-volver" src="img-pelis/Iconos/flecha-izquierda.png" alt="">
      </button>
      <div class="info-funcion">
        <h1 class="titulo-funcion"></h1>
        <p class="subtitulo-funcion"></p>
      </div>
      <button class="boton-info" type="button" aria-label="Información de la sala">
        <img class="icono-info" src="img-pelis/Iconos/icono-info.png" alt="">
      </button>
    </header>

    <main class="contenido-asientos">
      <div class="pantalla"></div>
      <p class="pantalla-texto">Pantalla</p>

      <div class="mapa"></div>

      <div class="leyenda">
        <span class="leyenda-item"><span class="muestra"></span>Disponible</span>
        <span class="leyenda-item"><span class="muestra seleccionado"></span>Seleccionado</span>
        <span class="leyenda-item"><span class="muestra ocupado"></span>Ocupado</span>
      </div>
    </main>

    <footer class="pie">
      <div class="resumen-fila">
        <span class="resumen-etiqueta">Asientos</span>
        <span class="resumen-valor"></span>
      </div>
      <div class="resumen-fila">
        <span class="resumen-etiqueta">Total</span>
        <span class="resumen-total"></span>
      </div>
      <button class="boton-continuar" type="button">Continuar</button>
    </footer>
  </div>

  <script src="js/datos.js"></script>
  <script src="js/asientos.js"></script>
</body>
</html>
